<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xinyi Liu — Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'PT Serif', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('background 3.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .welcome-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 64px 72px;
      text-align: center;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.12);
    }

    .welcome-card h1 {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #2C2416;
      margin-bottom: 24px;
    }

    .welcome-card p {
      font-family: 'PT Serif', Georgia, serif;
      font-size: 1.1rem;
      color: #4A3C2C;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .start-btn {
      display: inline-block;
      font-family: 'Bitter', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #F5F0E8;
      background: #2C2416;
      padding: 14px 40px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .start-btn:hover {
      background: #4A3C2C;
      transform: translateY(-1px);
    }

    @media (max-width: 600px) {
      .welcome-card {
        padding: 48px 32px;
      }
      .welcome-card h1 {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="welcome-card">
    <h1>WELCOME</h1>
    <p>I study and learn design, HCI, and AI. Happy to see you here!</p>
    <a href="about.html" class="start-btn">Start Now</a>
  </div>
</body>
</html>
